body:
  text: 序夫疫之為病古今不同其變態區區不可枚舉也長沙氏述素難作傷寒論以救當世夭橫然於溫病但舉一端而已千載之下有又可氏出發明其餘論以著溫疫論可謂千古活眼能羽翼長沙氏者也生民到今蒙其澤誰敢不矜式之雖然又可氏亦有所略而不說百年之後發其餘論者誰吾先大夫溫恭府君也天明戊申疫氣流行延門合戶為之死者不可勝計當時疫氣一變而上盈下虛屬少陰證者多初尚依又可氏法而療之不能獲效於是焦神覃思求有所以救濟適讀嶺南衛生方始有所發乃用附子往往起死回生焉自此以往療疫數百人豁然貫通左右逢原遂詳指其所因明辨冶法記所經驗名曰溫病之研究臨卒稿成不肖德輿恐其湮沒欲與同社共之命繡梓以播告四方門生願與疫論並行於世則於療疫庶幾乎其無所過失矣乃先大夫之志也嗚呼可謂能羽翼又可氏者也矣文化辛未仲冬不肖德輿謹撰
