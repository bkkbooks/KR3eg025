body:
  text: 卷上募原募與膜通慕各切舉痛論作膜原瘧論曰邪氣內薄於五藏橫連募原王冰曰鬲膜之原系也舉痛論曰寒氣客於胃腸之間膜原之下血不得散王冰曰膜鬲間之膜原鬲肓之原百病始生篇曰虛邪傳舍於腸胃之外募原之間較此數語膜原之地指伏膂之內腸胃之外鬲膜之下言之又可氏曰伏脊之內附近於胃正當經胃交關之所是為半表半裡故熱淫之氣浮越於三陽易陷於胃是以全篇亶主胃實而立論他若戰汗發黃畜血下利二便癃閉諸症亦為系其變移一語無放誕之文咸出其經驗能解病之肯綮然而余歷視近世之疫邪之所舍同在膜原至其所傳屬胃實證少而上盈下虛及少陰症最多有異乎又可氏所論之規範者何也雖曰邪之所湊其氣必虛豈當年下虛人寡而今下虛人多有此二傳證乎夫風有世運而情無古今私欲餐居與其時相同而所以其證異者必非緣乎人事乃厲氣之少變態也考之針經第一篇曰肓之原出於脖胦按肓鬲肓甲乙經曰氣海一名脖胦一名下肓在臍下一寸五分奇病論曰肓之原在臍下脖音勃胦音坱脖胦臍也王啓玄曰瘧論注腎脈直行者循膂伏行謂之伏膂脈並據此語從膜原傳腎行乎便道也上盈下虛乃分傳胃腎二藏也又可氏謂九傳而外如此甚者有二傳焉不可不講若逢此等證不論熱之多少津液之涸濡便將附子引火歸原通腎為要苟不會到於此理如無楫行舟難矣哉治今之疫余嘗講溫病之研究讀至募原曰募音慕各切與膜古通一老醫先生卒而厲聲曰字書募音暮無膜音以余為誤讀傲然罵不休余從容問其說先生驟言曰吾有祕說不敢語遂不答蓋難經曰募俞原穴之事也與此篇之義沒交涉固不足道曾以有受鄉訕聊記席上顛末解嘲耳又可氏曰邪之舍膜原氣壅火積氣也火也邪也三者混一化成邪熱則氣消血熬精神幾微遂至殞命故客邪貴乎早逐半日不逐有半日之蔽一日不逐有一日之蔽乘其氣血未亂肌肉未消津液未耗病人不至危殆投劑不至掣肘愈後亦易復善醫者不過知邪之所在早拔去病根耳是千歲不易之確言莫有間然焉今云邪之離膜原有二三日即潰者有半月十數日不傳者延纏日久愈沉愈伏多致不起至於此余始疑半月十數日其不傳之間晏然以達源飲勉希邪之離膜原而不離徒歷日之際藏府愈壅塞榮衛增郁遏邪火日熾氣血津液逐時煎耗又可氏怖其煎耗加大黃導邪陷胃家俟其實下而取之是開門劫賊之義也理亦不順於稟賦之厚者尚可若遇有下焦一隅之虧者恐生不測之害耳然則俟自離膜原耶不然有一術於此及原邪無積陽之助熱勢未漲大將瓜蒂以搜邪之巢窟驅之使出自初所入之門即與發散之義同於理莫切焉但未嘗試之私思淑之已適聽弟元隆行此法治疫之說契合余夙所思姑舉按證余說之不妄一老賈感疫始憎寒而壯熱無汗嘔逆煩渴舌胎滿白請弟元隆治與三消飲而不解至於八九日諸症增劇病人更請曰為與吐劑不吐不瘳元隆曰子甫過知命血液已涸非吐之所宜不聽固請不已卒與獨聖湯得快吐三次大汗淋漓衣被濕透翌日熱解胎脫諸症霍然而治調理數日而愈他日詰問所以請吐乃曰我不知也發病二三日以來神氣昏蒙無一所知覺請吐亦讝語耳老賈本無文不辨醫事而請吐不已吐而得愈蓋依冥護矣又可氏記黃連條所謂靈變同一軌耳今就此按而視之所謂膜原為半表裡與導之內而下不如吐而出之外之為捷徑也亦為一手段若遇邪勢之劇而不潰者孰與托之達原曠日稽留乎足以補本論之遺傳變不常下氣空虛邪熱乘之致小便閉塞者又可氏以承氣療之令所視之症一無下症下元虛憊陽氣不施於膀胱而閉其症雖多有非茯苓四逆輩不治者其症舌上乾燥而無胎詳見於本條急證急攻此證多在用力過度常勞筋骨人用力則筋骨先受傷肌肉畜火血液常熱脈絡膹興大便燥結皮肉緊薄實為陽藏人疫邪一來有著其實兩熱相搏熇熇徑張乎分外之熱妝飾出乎許多之變態猶之燎原火加風一時為灰燼一日三變殆乎類此余嘗視三日而斃者即夜發讝語二日神氣惛悶三日狂躁病勢之暴頗如烈火不可向近也熱邪散漫邪雜膜原散漫於肌肉也又可氏注誤成無己去石膏專達肌表知母石膏苦甘以發散之語以白虎為辛涼發散之劑清肅肌表氣分藥也又可氏常以此意用白虎故全篇至言白虎輒有多少之差夫邪之在肌肉也向里蒸胸腹則煩渴向外熏肌表則大汗出石膏能消肌肉之熱熱消則渴已汗止而愈知母消腹中散漫之熱甘草和胃氣粳米和石毒又可氏於此劑加生薑幾乎畫蛇足內壅不汗內壅不汗者下之便得汗而解與服白虎大汗而解義同若其無下證者可如之何初於伏邪欲潰未潰之際表有大熱肌燥不汗者得達原加茈胡蒸蒸而振汗出而解間又有屬少陰者雖論云三陰不得有汗而投附子反得汗而解附子者通腎氣引火歸元夫邪火之混同者得附子正邪分離方發微汗而解此亦時疫之一體也不可不記下後脈浮此條脈證如本論宜茈胡清燥湯轉樞潤燥緩緩可解已白虎不中與若皮燥微煩蒸蒸熱之難解者此為餘熱停於肌肉宜竹葉石膏加減減石膏分兩去半夏加知母與之如用白虎類牛刀割雞恐卻傷胃氣耳又可氏誤會白虎為發散之劑間有不合其矩規而似庸醫之為敢彈其一二解後進之紛本論云邪熱浮於肌表當為肌肉邪浮肌表應見發熱惡寒治亦用羌葛之類今無寒熱證則可非肌表又云身微熱即身無大熱也白虎麻杏甘石越婢條又云白虎辛涼除肌表散漫之邪熱當為白虎寒涼除肌肉散漫之邪熱此則無一味辛何得言辛肌表有三陽之經界浮於太陽則頭背熱浮於陽明則胸腹熱浮於少陽則胸脅熱而余所可徵言合浮於三陽即合病證猶熱有偏不可言之散漫也至於肌肉無有經絡之分界邪入於此所周身皆熱是為散漫之熱又可氏於白虎頗覺技癢耳下後脈復沉下後脈沉而弱發渴者為邪陷於少陰經云腎惡燥渴自救耳邪氣復聚又有得戰汗而解者須與本條查看下後身反熱下後雖身熱不休唇舌乾燥而脈弱食少不進神惛不復者為邪尚在膜原施及少陰宜冷香飲子冷香飲子方草果附子陳皮甘草生薑上五味照常煎服丹溪心法下後脈反數誤下之後口燥舌乾而渴其脈數若數疾額上熱者雖心腹硬滿而痛數日不大便小便稀而利者此陰證之似陽虛陽之奔騰陰凝不流之所致乃屬下虛上盈四逆加豬膽汁人尿主之小便甚稀神惛不省茯苓四逆加前二味為佳但不因誤下亦此證常居多數疾脈下虛上盈證並見於本條因證數攻又有陰證似陽而數反復者其證熱渴共甚口舌乾燥而無胎又有至生芒刺者或頭痛或下利腹候無下證脈數而無力與加減真武湯二三日而熱解渴休舌潤錯語減咳痰輕食增神蘇一二日而前證復起如此三五次而斃者此屬陰證雖熱解之際仍宜與附子劑勿忽諸周因之案中曲盡與承氣之趣能得長沙之法苟不度熱毒之微甚諒精氣之多少決正邪之勝敗而製劑之輕重雖證治相當而恐招乎伐天和誅無辜之過豈可不慎乎又云有應用柴胡清燥湯有應用犀角地黃湯私觀時師之為有知用柴胡清燥者於犀角地黃乃非見血證之後不敢與類遘盜而後修門不亦遲乎學者須用心焉朱海中者證四肢不舉身臥如塑目閉口張舌上胎刺問其所苦不能答云云其危不可言而不死者何第無煩躁讝語無煩燥讝語則神氣尚完神氣尚完而死者未之有況脈有神乎與醉臥勿醒者情態有同趣焉又有少陰證形狀幾相似而舌無胎刺但乾燥已余嘗與真武加減方而得效又有脫氣而爾神彩脈狀大異可察病愈結存一少婦溫疫熱解後脈證俱平唯大便不通少腹沿橫骨結塊纍纍相連如藤莢狀按之不痛無他妨害飲食慚進至三十七日方通四五日塊盡而愈此條云往來蛙聲之一證因於中焦虛寒下焦闔氣不通詳見於下項本條下格不拘大便之通否時時作嘔飲食不進少得湯水則嘔吐愈加又有蛔厥證詳見於下項本條下格大便不通有陰陽二證若無變無害者只投本證之劑勿拘於下格津液既回自潤下而愈論曰小便數者大便硬不更衣十日無所苦也又曰今為小便數少以津液當還入胃中故知不久必大便也然則大便不通亦有因津液桔燥者也概勿為熱閉妄投下劑一女子溫疫瘥後大便三旬不行以其疫本屬陰證無一可下之候荏苒與補中湯臨時加減之際食漸進津液從回大便得行而愈一男子甫及強壯輕疫之後大便不通旬余常苦後重醫與承氣麻仁輩愈不通轉加夯悶以導藥挑之亦無功更請治於余診之得其脈大大為陰虧證屬虛燥脈證相應雖飲食不進動作尚未衰乃處腎氣丸作湯與之已旬日大便方行小便從利而愈注意逐邪條此篇說逐邪之旨趣曲盡無遺恨讀者貫透於此理於療疫乎何有非止療疫而已百病皆然本論曰原邪傳胃蒸而為結大便當不行又有蒸作極臭狀如黏膠至死不結此因其人平素大便不實也余較之多人非必因其人之平素原邪入胃驀然暴則無暇稽留於胃而蘊熱驟然直下走其色初焦黃隨利隨薄甚至下利完穀以承氣逐邪則便止有止而復下利者餘邪復聚胃也宜下之便止如此至於再四者胃氣憊敗而死又有少陰證非同日之談但不可下之候正在心下與舌上以其人下走熱不蒸上焦故舌無胎以其亡津液邪熱獨存舌上紅滑乾燥而已又以其下利心下必軟但按腹有心下一點硬痛是毒之未盡也並宜下之毒盡而利止畜血本論曰畜血一證盡因失下亦有少陰證而下血者其證初邪在膜原其未離午後發熱與達原飲引日之際精神恍惚但欲寐舌根白胎唇口乾燥腸鳴下利或不利而微渴小便不甚赤發熱不止手足時冷全無下證亦無畜血候而下血如注或如崩作片婆娑者是少陰證而下血也經舉痛論曰寒氣百病始生篇作虛邪客於腸胃之間膜原之下血不得散血氣稽留不得行息而成積所謂膜原之下即鬲肓之原為少陰之地衝脈屬焉主行血是以知原邪之傳少陰逆走徑路也陰證而下血邪火相煽暴其所屬也由此視之畜血之始在邪舍膜原之際方當此時窮思挑撥貴早使離膜原早離膜原則無傳少陰之憂不傳少陰固無畜血之害若稽滯經日及熱千血絡留為衃血不肯不下其已下也能得免者十二三而已夫畜血之候不論陰陽二證逮合夜必發熱或少腹急結按之痛較他處其熱稍盛或其熱連右脅大便數日不通是也又大便利亦有下血論以小便利為其候本論云不利亦有畜血往往有不拘利不利又以大便黑如漆為其候但見此候者不俟時日直下血無暇預為備至於善忘喜笑如狂之證常不多見畜血候如此不多間有不見定候不意下血而不拯者故於此一證余未得其襟轄聊舉所歷試一二條取證曾見有下血如崩如注連日弗止者精神未亂言語未錯而卒不起此因失血過多原氣已敗與産後脫血而死者一理又有精神已亂言語已錯煩躁不寧比之前症危不可言而蘇者雖系治之巧拙實因原氣之虛實又有下血連日而稀少外有熱者與吳氏茈胡湯加生地而血止而愈者夫下血證之發必在耽挨延日熱欲減不減不食多時精神已憊之際便欲攻之藏氣不勝其劑如犀角地黃雖能當其證日暮途遠倒施不及若血下愈多則至陽亡厥逆而不濟於事余依經云脾裹血急與單人參湯以專救中焦中焦一蘇則血隨收其有熱者副用童便清熱滋陰而擇用犀角地黃參附養榮輩以收全效近頃以此法數有效功用攻擊劑挽回者未之有單人參湯方下血吐血過多雖額上汗出脈虛微而數尚宜此劑人參一錢以水二合半烹取一合分再服發黃疸是府病非經病也舍弟詮曰此論發黃初有其條目此題發黃疸是府病非經病也之十字蓋此本文誤為篇目也此條意因於小便不利與胃家移熱也然則病原不屬小腸膀胱則屬於胃雖黃見於外非管於經故謂疸是府病之二句為此篇冒頭之語也黃曉峰本曰舊論發黃有從濕熱有從陰寒者是亦妄生枝節學者未免有多歧之惑矣夫傷寒時疫既以傳裡皆熱病也熯萬物者莫過於火是知大熱之際燥必隨之又何暇生寒生濕闢若冰炭是豈容並處耶既無其證焉有其方智者所不信古方有三承氣證便於三承氣加茵陳山梔常隨證施治方為盡善此一條劉徐二本並闕黃本獨有此一條條末曰此言為吳君白圭之玷而不說所以其為玷徐天章就黃之言舉陰寒濕熱皆有發黃之說適遺原文耳劉方舟未見黃本徐本故於愚按一條云重刻者駁正之論不斥言其人為誰按黃家從濕熱蒸成又有陰黃證雖黃口兒猶能知之況於又可氏乎安不知此義然謂無有此證者乃就瘟疫胃實上而論之也故上文云傷寒溫疫皆熱病也何暇生寒生濕即論三承氣加茵陳其意自見黃徐看原文黭淺妄造雜駁之說復使後學執迷焉可嘆所云吳氏所論乃陽明發黃一途而已又有邪陷三陰則熱與陰化亦為陰黃不可謂溫疫無陰黃曾視下虛上實證發黃者其證雖腹中硬滿按之則痛然勿遽治黃宜急救下焦下焦得復而後治黃未為遲也天明戊申正月晦京師大火嗣後洛中外溫疫大行至於九十月厲氣寖衰尋黃疸行概以茵陳五苓散治之其證心下微滿小便黃如蘗汗已若小便短少大便祕結眼中黃黑色者以茵陳蒿湯下之二三旬而得復常醫宗金鑑曰天行疫癘發黃名曰瘟黃死人最暴是一種之黃非令所記之比溫疫胃實失下暴身面發黃眼中如金於是與之承氣加茵陳而不及不日告赴又可氏所云燥火發黃是也蓋脾胃困極於熱而所發但見此證每在瀕死之時挽回實難全因失下治豈不慎耶邪在胸膈此證與蛔厥易混病在初起之際為邪留胸膈在病闌之日多屬蛔厥但兼善寐證則屬少陰證概鑑之為據更審脈證而蒞之可無大過矣辨明傷寒時疫正誤中駁冬傷於寒春病溫云感冒輕者尚當即為病不能隱容今傷寒非細事也反能藏伏過時而發耶其說甚確也於時疫更言感久而後發時疫何故感不即發久而後發傷寒時疫等為厲氣以榮衛之行度視內外為一致彼何感而即發此何感久而後發與正誤所說徑庭矛盾又可氏之言似僻而不通矣後更考之夫肌表者一身之藩屏而衛氣護之雖毫芒刺膚則痛而苦楚不除不已者護者之固而不隱容也護內亦如此而容藏便不發何也今有誤吞骨核之類者入腹不覺痛經日之後上吐下泄而忘少害是內有所受之壖地容藏而不妨以時而出也以此視之膜原表裡之分界必有遊地邪乘其隙伏匿陰養乎屈起之勢故感而不覺久而後發或亦有之乎又可氏以傷寒為傷於非時之風寒故不傳染誤也又可氏所謂傷寒陽明曰中寒是也夫傷寒者疫厲之總稱而與熱病相類故難經曰傷寒有五有中風有傷寒有濕溫有熱病有溫病其所苦各不同又長沙曰余宗族素餘二百建安紀年猶未十稔其亡者三分有二傷寒居其七自非疫厲而傳染安能如此其夥乎長沙東南地風氣和平人生其地而住其土固習其風土多少之寒燠縱令能傷豈人至於死耶非使冀方人移居於此之比以此為據則又可氏所云幾乎屬荒唐又可氏曰風寒疫邪與吾身之真氣勢不兩立一有所著氣壅火積氣也火也邪也三者混一與之俱化失其本然之面目至是均為邪矣但以驅逐為功所云氣即陽氣充身而溫和者也若一壅塞則鬱為火者陽之體也其發為熱者火之象也故熱之微甚因邪之輕重邪輕壅塞微邪重壅塞甚只將甚使壅塞者以硝黃驅而除之則鬱陽為伸而淫邪鼠竄是視熱施治之襟轄也但於少陰一證罔可驅逐之證勉以附子通腎氣引所混同之火徑歸於原則邪與藏相離熱勢頓減腎氣日正邪氣隨衰於是舍附子專事滋陰以收全效彼逐邪以救正此通腎氣以屏邪陰陽二證治法之迥別豈翅霄壤耶戰汗按辨脈所云戰汗由血虛吳氏所云戰汗由表氣內陷二說雖異戰之理一也然以瘧之戰栗視之吳氏之說為幾戰汗狀原病中說之詳悉宜查看凡戰汗候伏邪已潰欲離不離表無大熱里無實證但有肌熱不增不減數日不解而津液微回舌傍生潤粥食不絶脈狀帶數如此者多作戰汗而解但此證不一而足有至二三次或五六次而方解其間每隔五七日勢緩者有隔十餘日復發病家不勝其哉其熱其汗有半途生疑更醫取敗者又有戰汗後神氣當爽慧反神疲食減經旬日才復故故是戰汗最重而里衰法從瘧治以清脾輩破膜原疏胃家而得愈又上盈下虛證亦有戰汗者翌日熱解氣爽慧灑然如洗於是仍宜與真武冷香輩以守真護元為要勿拘戰汗不爾以津液從汗泄腎精轉耗邪氣愈陷午後氣分沉滯神氣惛晦言語不與人主當荏苒罷弊甚者氣高奄忽而逝又可氏曰厥不回汗不出者為正氣脫厥回無汗者真陽尚在言一死一愈而為之不立治方置之度外舍而不顧也余按經陰陽應象論論腎曰在變動為栗又五運行大論曰其性為凜據此視之所以戰栗者邪頓陷於腎也腎氣實則不受其邪推而出之外為發熱大汗而解若腎有虧則無與邪相抗之力腎氣與戰共衰為搐為痙而斃故若逢此證宜急與四逆輩幫扶真元腎氣得通厥回神蘇漸復前證至於此仍與附子以備他日之再戰自汗第一論云有汗無汗存邪結之輕重然亦因津液之多寡凡瘟疫首尾漐漐有汗者為津液有餘也雖不亟解竟易透表無汗皮燥如灼津液先虧也必成里證或生局外之變瘟疫熱大半解而汗出不止者餘熱從汗解勿拘於汗宜茈胡清燥茈胡養榮諸湯擇用若熱已解食能進而自汗盜汗者新造榮衛不勝穀氣也殺穀則止又熱已解食不進肢體無力汗出不止脈數者屬虛象宜麥門冬飲盜汗同法方麥門冬飲方麥門冬人參五味子黃耆當歸生地黃上六味照常煎服邪入陰熱自減有汗亦應止論曰三陰不得有汗而汗易出者亡陽之兆也雖唇舌乾燥渴而大便不通宜急與真武四逆輩時師畏此假熱證不知敢行附子所以世多冤魂也盜汗難經曰漏水下百刻榮衛行陽二十五度行陰亦二十五度為一周也又可氏曰人目張則衛氣行於陽目瞑則衛氣行於陰行陽謂升發於表行陰謂斂降於內難經所說謂榮衛之常度又可氏以寤寐發明此義誠千古之確論狂汗傷寒陽明病內有水寒陽氣格而不通則為骨節痛若能食者水不勝穀氣卒然狂汗而解按傷寒狂汗為腹內事吳氏以為肌表事亦髮長沙之餘緒狂汗候頓發狂躁煩瞋目驚呼其狀可怖但其證甚稀不知此候者瞪然無所措手足耳發斑按外臺傷寒發斑系胃爛內熱危甚溫疫發斑因伏邪已潰外出榮分為易治輕重之間豈翅霄壤耶斑之所由發詳於斑汗合論中但斑每易內陷急與舉斑湯托之為要若毒內陷者宜副用底裡野加一人大發斑其色濃紅如緋桃花三四十日不解其際熱有潮汐食有增減體罷神倦似勢難支勉與舉斑湯時副用半夏藿香湯二閲月而全愈所謂斑發血分重濁難化可知又有伏邪已潰大半傳少陰小半傳血分外發斑內下利善寐於是舍斑護少陰與真武加當歸若有熱以生地代當歸日後斑自消而不為害數下亡陰陰證下利多日不止亦有兩目加澀口舌乾燥尚宜真武甚者副用童便如白通加人尿豬膽湯邪盡津液回亦是一術解後宜養陰條溫疫解後餘熱動支飲痰涎湧甚胸膈不清者與蔞貝養榮湯不出五七貼而有效及十餘貼無效者非其證也宜更張又有下虛證客氣動膈咳痰不休者宜主用生薑附子其證多大便下利脈狀不實用參宜忌條又可氏於人參其意中焦無虛候者斷不可與之今實者再三投之即加變證云云又可氏之所云太佳可針砭乎時師之俗腸但至於其謂人參行血里之補藥不能無論欲說之辭涉繁衍姑置不記所謂變證者腹脹不食嘔逆趺腫小便不利等是也一官娃甫四十餘初患輕疫誤治延日幾乎一月所請余診身熱不食唇燥舌燥錯語困臥大便滑寸口脈微趺陽微而不鼓神彩甚衰辭不治固請與之補中益氣湯加附子頓奏奇效熱減諸證良輕尚與前劑至於五六日前證復起腹脹食減趺腫更加神氣惛懵知是過用參附之所致更與安心養血湯亦不利前後投藥旬日而固辭後月餘赴聞至私考此非參附為害幾微神氣固屬不治偶藉參附之力挽回餘氣暫照殘光耳下後反痞心胸即心中為上焦邪留上焦無可下之理又可氏指心下言心胸一家之常言且心下痞證長沙禁下之若遇此證能可審虛實妄勿下之一老夫溫疫得下證下之諸證除去七八精神稍蘇言語略正五六日而心下更硬滿按之痛下證復具雖老人不得不下斟酌復下之心下反逆滿氣促急投真武加減湯峻補連進毫無寸效精神日衰而死下後反嘔又可氏云下後反嘔為胃寒亦有屬蛔蟲詳見於本條飲家亦能發嘔一婦人甫三十歲所溫疫經日身熱不已唇口乾燥喘咳卒甚不食小便不利脈滑而數余與蔞貝養榮湯一貼得效二三貼而唇舌生津食進小便利脈亦靜忽發嘔時吐食更與乾薑半夏湯嘔吐不日而愈按此婦身體肥白素為飲家故投此湯而愈奪液無汗又有不汗下以奪液而無汗者津液素不充也雖脈浮不可強責其汗假今何藥每無遺滋陰為上策但於滋陰藥有膩膈妨食者亟卻去勿與之欲津液之回莫善谷焉蒞於此際百斤地黃不如一杯飯時師不知此理謂熱病不食其常事有強滋陰愈增不食中焦先虧變證百出無遑於求津液而噬臍者補瀉兼施循衣摸床撮空理線筋惕肉瞤肢體振戰目中不了了等證又可氏云精神殆盡邪火獨存則致此證將黃龍湯冀回生於萬一余說異之至於此際勿論於邪火專系乎神氣虛憊之極言如雜病之無邪熱者在瀕地之時尚見此候豈可言之邪火而攻之耶如以石投卵未有不潰者矣故余臨此證輒用真武加減方甘草以緩熱和胃附子以引火歸原勺藥養榮生薑化飲回陽茯苓定心煩如此或有反日之功然此證補瀉不及兩無生理與其仰黃龍而死孰若服玄武而亡乎似又可氏未會此理矣又可氏又曰云云等證此皆大虛之候將危之證也急用人參養榮湯虛候少退速可屏去余按證候甚危急藥劑甚柔緩主八分之人參合之多味以欲敵之猶之以滕薛之兵欲掩齊師固無可勝之理倉公曰病重而劑輕不治是也又又可氏云虛候少退速可屏去恐非經驗言矣停藥或曰此條云服承氣停藥乃中氣大虧天元幾絶大凶之兆也若不服承氣恐不至於此是非容易事盍初商量其虛實而後與之與之之後方知變用生薑人參欲挽回焉恐日晚途遠矣吳氏所行似未切矣余曰是失下證不得已而攻之傷寒陽明一條猶有此症治曰陽明病讝語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉氣者更服一升若不轉氣者勿更與之明日又不大便脈反微澀者裡虛也為難治是便停藥證又可氏發其餘緒耳夫潮熱讝語實也為大承氣證然其脈滑而疾滑為內熱疾為衛氣失度非胃實之正脈以實若緊為胃實脈亦非陰證之脈以其近實欲先與小承氣視其真實否果見陰脈故為難治是與承氣之後就脈狀判之長沙氏盍斷之於未與承氣之前而於後判之與此條義相同不可專責乎又可氏也其用參姜者所謂發餘緒也余於此證異乎二公之撰說見於脈數疾條虛煩似狂師才診脈將手縮去此證間有之未見其愈者似非陰證實凶兆也特標出爾後學勿容易下手向余療此證始大熱下利純臭水數日不止食日減遂至虛煩無寧刻於是請治余診之身熱脈數心下硬滿按則痛精神疲弊邪熱膠固此因失下以不治辭請不休遂與大承氣湯得下四五行腹滿減下利止煩躁稍定思食而不能食翌日腹更滿而利煩躁復發復下三四行諸證隨減精神方蘇口生穀氣至夜諸證復起隨起隨下如此四五次腹滿愈甚一不見虛候而斃有如此者全因失下日多精神先虧之所為也肌熱略解穀食稍進而煩躁不定者血液已涸神不安乎舍痿論曰心主身之血脈調經論曰心藏神實為膏肓之患尚撰用安神養血湯加辰砂火府丹料辰砂六一散等藥無效者多不起火府丹方黃芩木通生地黃上三味照常煎服辰砂六一散方辰砂一錢五分滑石六錢甘草一錢上三味為細末每服五分一日服二三次神虛讝語煩躁者莫不讝語讝語者有不煩躁然治法不相遠又可氏之意以為鄭聲讝語長沙兩立名色暗斥長沙是不讀古文之過也長沙不兩立名色故六經篇中無復言鄭聲余說出於傷寒論說奪氣不語本論曰唯向里床睡似寐非寐似寤非寤呼之不應此正氣奪與服藥不當莫如靜守虛回而神思自清云云此儼少陰確證非附子恐不回若果正氣之奪非容易事豈唯靜守而回耶曰服藥不當故至於此邪之在少陰人參之力豈能至焉乎猶短綆汲井固所不及但此一證有能食而死者乃屬除中溫疫之寐與不語一類皆因於少陰樞之不轉根結篇曰少陰為樞折則脈有所結而不通而神氣不旺附子之力以通腎氣則機樞轉而精神爽慧寐者寤焉默者語焉耳妄投寒涼藥疫邪之著於人身也就其所著驅而出之一定之法也其著膜原也疏利之外出於三陽也發散之浮越於分肉也清解之內傳於胃則下之下入於腎則溫之上聚於胸則吐之又無表裡之確證熱有休作而難解者茈胡以挑發之是為常法時師不諳此法又不悟苦寒專清熱而無驅邪之能以為熱清則邪去不識邪不去即熱不清之義每每連連黃連解毒湯而無效便加石膏或白虎加黃連只清熱之務既熱未消旋隨傷胃氣穀食愈不進纏綿延日氣竭血涸遂幽泉路亦何限矣豈可不憫耶又可氏所論針砭時師之膏肓百六十年於此尚未有醫者可長愾矣本論論妄投破氣補益劑之醫夫蒞溫疫擬與是等藥固無眼者也不敢齒録焉大便邪之在表也視證觀色較諸脈狀而可知而療之也邪之在裡也燥證觀色參之脈狀伍之腹候亦可知所在其知之也皆系表察故每多疑慮動執迷誤治亦不鮮也但於舌與大便小便此三者徑可親視里之體寒熱虛實莫不見於此能諦此三證昭昭乎如照藏之鑑洞腹之草二豎無遁形焉死生吉凶於是乎判非唯溫病而已為百病之關轄學者須覃思焉又可氏曰協熱下利者其人素大便不調邪氣乘於胃便作協熱下利餘數遇此證平素大便實者尚作此證由此考之伏邪之傳胃暴則不能稽留於胃驀然乘勢迸出也故其色初焦黃寖變正黃黃白一如虛寒下利也是熱勢急躁不暇乎焦著而出當下之宜承氣湯勿拘色之濃淡臭之微甚有得湯其色卻焦黃其臭復酉宛惡是因大黃蕩滌邪熱而除卻腐穢下止思食則為胃氣蘇停湯勿與溫病初起午後發熱數日忽心下疼痛而不痞硬下利臭穢既而腸鳴虛滿小便稀少唇乾舌潤脈數而無力跗陽少陰脈不甚見此為協熱下利但以一無下證醫為陰證與之附子劑毫無效驗脈證自如於是更方轉劑延捱曠日之際津液日竭精氣日弊耳瞶舌燥食減神惛多臥二便自利或下血遂至不濟此固非陰證必由失下也初心下痛者是伏邪之傳胃也他不見下證及藏氣未疲津液尚存急下之恐不至於此宜達原加大黃若承氣湯隨證撰用利止食進二三日後有復下利為餘邪再傳胃雖心下不甚痛而見其機急下之耽閣移時日舊弊復起神脫氣竭非前日之比也又協熱下利有欲下而不可不者其腹熱而軟其脈數而弱延捱日久唇口乾燥一無下證者宜黃連阿膠湯若此證在初起而無下證者宜四逆散二方並見傷寒論所謂無下證者毒已從下利而消餘熱之未解也豈必承氣湯而已乎大腸膠閉其狀意欲大下利蒞便則屎黏著於肛內其所通卻此些已此證於雜病亦有為難治宜張子和木香檳榔丸又可氏曰溫病愈後反腹痛裡急者下焦別有伏邪所發欲作滯下也若果下焦有伏邪初逐毒之時藉其藥力而下爾譬如破竹迎刃自裂也夫腸胃一路何處伏留乎今有此證者乃大邪新除腸胃尚薄弱自易感時行氣別所發之病也但以里無宿毒雖病亦易解耳一羈客四十餘歲輕疫新解後大便不行半月穀道夯悶日夜不休以狀如脾約證醫連進麻仁丸分毫無效愈增下重請余診之其脈大而不實脈法大為虛不實即弱弱為氣衰其舌白而無胎白而無胎為陽微亦不能幹燥不食時嘔病屬少陰不足投六成湯副用腎氣丸諸證漸治有故不竣事而辭去夫此證與脾約形態無異但以脈狀可別之矣不通此義取證舍脈反與剛劑徒使胃氣逆遂至嘔不食而斃夫脾約屬實虛祕屬虛霄壤之遲而其證相同每易致誤豈可不慎乎小便又可氏曰熱結膀胱小便閉寒而不及陰證陰證下更宜有陰證字亦有小便不利甚至閉寒夫膀胱腎之府腎和則能出今腎受邪則戚促不施於膀胱而膀胱為死藏容而不出泄而不覺有而如無因腎氣之通否經云腎主二陰是也故小便閉塞小便不利雖利而稀治在少陰宜真武去朮腎氣一通則膀胱得蘇而小便便利若尚難利者外灸石門從內外內陽必利焉此證間有時師見其大便亦祕久不通固無意投附子妄引開北得南風之譬以大黃下之速死於倏忽亦不鮮也豈不愾哉小便閉寒不論陰陽二證必少腹結塊其塊日漸腫大有至於臍上每苦急迫但陰證不急迫而苦如無害者也醫藥得法雖小便利結塊未消盡為腎氣尚不全復服附子勿懈塊盡腎復但此證神氣惛憒者煩躁不寧者腹滿加噦者皆屬不治又有初小便不利卒至於一日夜僅一二行通則利二三合是膀胱津液滿而自泄也與遺尿同趣非腎氣通而利也並宜真武去朮又有陰證而小便數急淋痛者伏邪傳腎及膀胱也治以附子劑通少陰以益元散解膀胱熱不得純用豬苓輩疏泄膀胱恐日後有助下利之弊一婦人陰證神氣惛悶小便閉塞數日不通小腹結塊大如氣球醫以手術按而出之卒脫氣而死一貴妃陰證神氣恍惚大便十數日不行已至腹滿小便亦不利一醫欲下之但以無胃實證且腹中時為水聲余固持不攻已而小便快利得二三合則便額上出冷汗淋漓欲流四肢逆冷急投四逆湯回陽而愈上件二則尋常所不見姑記具參考前後虛實先實後虛又可氏概為失下血液搏盡證亦有未然者伏邪欲潰之際熱勢日張殆為胃實狀而不實隱然該見少陰證此為上盈下虛終不可攻之脈厥宜與後條查看脈厥神色不敗言動自如別無怪證此三句著眼處如此而脈厥果是陽證也舌無胎腹不硬不痛尿不甚赤而脈厥果是陰證也故下條云須以神氣形色病證相參以決安危是也體厥體厥一證施幼聲醫案中論之詳悉又有藏結亦體厥厥陰篇曰傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏結夫藏結者無陽證而體厥至其困極則體厥陽證隱焉二者皆躁煩殆乎難辨別但此證常無有所逢亦甚稀其候難明言特就煩躁上論之偏在躁擾無寧刻與有安靜之時而已伏邪傳少陰所謂伏邪傳少陰者初熱勢日張微渴微煩或大便下利如協熱利狀或大便祕而不通而無所苦心下似滿非滿似硬不硬按之似痛亦不覺小便微赤而稀疏或癃閉不通勢如欲旦夕傳胃狀而奄忽見善眠證欲嘔不嘔欲吐不吐是少陰之確證也人視其善眠以為邪勢折醫亦安焉不省概投茈胡劑延捱引日遂至於危殆若果邪勢之折當精神微蘇口思食飲諸證隨衰今熱不減利不止舌增乾燥胎雖薄不脫神氣恍惚如有如無於是急不通腎氣水源先涸真氣內憊恐有噬臍之悔矣宜加減真武湯茯苓四逆湯輩下虛上盈所謂伏邪分傳於胃腎二藏名為上盈下虛其證上中二焦大熱大渴口燥舌乾黑始生芒刺或無胎耳聾不食煩燥譫語是逆頭痛如破鼻衄如濺是邪傳於胃也亦至夜間大便滑泄小便稀疏日夜僅行一二時時腹痛為水聲或為往來蛙鳴惛惛善眠手足時厥是邪傳於腎也二藏證兼見者假令大熱短氣心下硬急與附子無辭二藏證該見其脈沈眩而數或數疾如急湍如此脈證最為難治就上欲攻腎則有害於胃欲回下虛反助上實將虛實兼療乎王叔和所云神丹甘遂合而飲之也言巧似是其理實遲夫病有淺深治有先後能得其法便有一舉兩得者夫下虛不溫腎氣不通則上實不降上實不降則大熱不減亦非參附養榮輩緩劑之可救故舍附子無如之何而已余竊考之伏邪本雖甚分傳之上下二藏則熱勢不專一自易制之理也雖然上熱反劇於胃家實熇熇然勢不可當何也夫邪入於少陰腎氣動而不寧上有感招之實熱少陰之火隨而奔騰混同為一以張分外之熱但陰火之性煽而揚之延蔓之速猶燎原之火不可向近也故欲治之所謂先平治腎氣引火歸原則壯熱頗半減胃中唯餘五分之客熱使其勢孤弱自易化耳是以余於真武湯中去朮加甘草以療此證所以然也夫壯熱之氣苦寒以清之為治之常法唯有於溫疫少陰證並上盈下虛便用常法反激而不服其弊逮下虛之所轉增虛候於是甘以緩之則激者下降烈焰自熄即柔能勝剛之義也加減真武湯方茯苓芍藥附子生薑甘草上五味以水二合煮取一合冷服若熱甚津液涸竭者加熊膽童子小便服之甘草降火芍藥養榮又二味戮力以和胃氣茯苓利小便治心煩生薑化飲回陽所以不用幹姜嫌其燥熱也附子通腎氣引火歸原歸原則津液隨生邪氣自化其所以冷服資一以潤上之二焦一以停藥力不下走但此劑雖有甘草芍藥以滋辛熱猶恐有抱薪投火之弊故至津涸者加膽汁童便以護燥清熱亦長沙之遺意耳瘖啞松峰說疫劉秉錦曰失瘖者舌仍能轉運而喉中寂然無聲也與舌強不能言者自難混呼矣溫病無聲十不救一所謂熱病喑啞不言三四日不得汗出者死也此證總由溫邪入藏熱氣衝寒燔灼所致余考經文宣明五紀篇曰邪搏陰則為瘖又脈解篇曰內奪而厥則為瘖俳此腎虛也腎脈俠舌本邪入腎經脈不流故瘖不得言也吳劉二氏以為心氣耗損而然劉又舉病因數條果然也否但值此證常不多故適值亦不經意逢變方噬臍不知者仍恝然不介意豈可不講乎哉數疾脈數疾脈狀如奔馬又如急湍脈法曰脈數疾衛氣失度浮滑之豚數疾發熱汗者此為不治夫衛氣失度藏府經絡四肢百骸無所不失度猶之天之日月星辰纏度之有差纏度之有差因北極之機樞有變動也衛氣之失度乃下元之失守也豈此容易之事乎故得此脈者病輒為難治譬之自鳴鐘去其雌墜則大小諸輪一時急轉輷然雄墜直下下盡至地則休及其未至地以雌墜掛下之復更諸輪瑟瑟轉常度行無舒疾雄墜之下亦平也所謂雌墜者下元之守也諸輪之轉者榮衛之行度也雄墜之直下者脈之數疾也至地則休者其人死也及其未至地以雌墜掛之者投附子以回下元之陽也能及其時則營衛復常脈息得度數疾之退乃雄墜之平也世醫不會到此理隨證與茈胡投承氣反能殺人余每遇此脈輒舍證取脈候脈狀之復而後隨餘證療之或回生於九原下掐陰溫疫陰證偶有掐陰器不休者於失下證亦有比比皆死但至見此證精神已惛蒙詰問不得何故所為然近頃一兒染疫六七日煩躁讝語神惛不寧頻掐陰坐臥不休余診之少陽孿結連於少腹按之至橫骨傍則蹙額如痛難堪狀而所掐便止放手復掐體作隨手照餘證與加減真武湯八九日而熱解神少蘇所掐漸止於是問其所以掐兒曰䘒痛不掐不堪故掐始知此藏結證所云脅下痛連少腹入陰筋者死是也余嘗療幾人不治斯兒獨得生者非吾之力也蓋因精氣未散混然天機完固也聊記備後案
