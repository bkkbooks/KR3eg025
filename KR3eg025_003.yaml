body:
  text: 卷下雜氣論方書云天行時行病而不言其所行之氣為何等氣又可氏乃言之雜氣雜氣中有一種之猛烈言之厲氣往哲所未闡發卓犖確論也然唯謂六氣之外別有雜氣其為氣也無所可求無象可見而不言其氣之為何物其起從安所則泛然幾乎河漢之言已蓋雜氣之起當復有因焉因明而百雜氣可辨也余讀左氏昭四年申豐曰冬無愆陽冬溫夏無伏陰夏寒秋無苦雨甘霖春無悽風寒雷出不震霆無菑霜雹癘疾不降癘惡氣也民不夭札短折為夭夭死為札據是觀之疫癘之行因六氣之不和鄭玄曰癘疫氣不和之疾疫癘之氣即風寒雨陽不正之氣所化成非六氣之外別有一種之癘氣者醫和曰淫生六疾淫過也過度失常即不正不正即淫邪淫邪之行變幻不一而足雜氣之作疾變態無限惡莫所不抵故所謂雜氣者即六氣不正之所釀成非六氣外別有一氣也故方其發也多挾時令之氣又可氏言之借時氣而發難經五十八難舉五傷寒曰有風溫有濕溫長沙氏作傷寒論曰中風中寒風濕相搏周官曰四時癘疫春時有痟首疾夏時有癢疥疾秋時有瘧寒疾冬時有嗽上氣疾皆以帶專令之氣致有許多之名色是古義也故謂雜氣者六氣不正之氣非別有一種亦足以證兵荒之後疫癘大行何也夫一氣之不和尚有雜氣行焉況如兵亂凶荒由陰陽之氣亂不調燮且餓莩不斂死亡無訟怨魂殘氣充塞其地能合不和氣發為癘氣子産曰鬼有所歸則不為癘其治在君子醫巫攻之雜氣之一篇又可氏究力曲盡乎雜氣之情態無得而可間然矣但至於大麻鶴膝歷節老人中風腸風厲癇癰疔流注丹毒等之疾以衆人所病其證相同言之雜氣之所謂然其病名顯然有因而後發不可言之雜氣若以衆人其證相同言之雜氣乎如虛勞勞瘵亦言雜氣所為可乎乃矯曲過正駟不及舌也又云瓜瓤溫探頭溫疙瘩溫幸而幾百年來罕有之證余於他書未嘗見此病名近於清人劉松峰雜疫論中始見載瓜瓤疙瘩之證治須查看備不虞蛔厥蛔厥之一證又可氏所說在胃實之際兼見蛔厥也故治胃熱蛔厥自愈是發傷寒論之餘緒也余頃年屢遇此證從胃寒來者居多其證不異厥陰篇所云夫溫病及熱稍解乃飲食應進有忽發嘔反不食是屬蛔厥其證兩顩潮紅下唇鮮紅而干時心煩臂熱或發熱呻吟時靜默不語或腹痛腹熱心下妨悶時唾涎沫其脈數而弦若浮大是其證候也雖口舌乾燥大便幾日不行宜陶氏安蛔湯與湯數日假令無其效勿錯慮於其間是蟲氣之盛而藥力之未達也有旬日方有效者又有不過二三貼而有效者若腹痛不已投劑無效者宜甘草粉蜜湯救急此證每於熱稍減之際而發有與升陽散火湯證相似幾乎難別者余常以舌胎之有無撿之百無一失理中安蛔湯方甘草粉蜜湯方人參術茯苓山椒烏梅乾薑甘草上七味照常煎服今加甘草乃蟲得甘則動動者易制椒梅以殺之即烏梅以蜜丸之意也若手足微冷加附子厄逆厄逆古曰噦是也又可氏亦似被注誤陶等又可氏云寒熱皆令厄逆但治本證其厄自止是也巢源卷九熱病噦候曰伏熱在胃則令人胸滿胸滿則氣逆氣逆則噦若大下已後飲下多胃內虛冷亦今噦也今按不唯胃冷屬陰證最多又可氏所譏者吳人每見於胃實之際噦者亦以為胃冷治之也噦有寒熱之別應將餘證參考自勿錯誤之失爾溫疫下證具投承氣下之煩狂已定忽有發噦以其脈無力更與四逆湯凡十有餘貼而止以其無即效勿半途換劑非劑之不應病深藥未徹其處也少陰證發噦與四逆輩而不止者宜天樞氣海灸之溫疫發噦不論寒熱其證甚重宜勿忽諸故經曰病深者其聲噦是也又有兼見腹鳴為往來蛙聲其證極危腹鳴腹鳴與轉氣其證自異也轉氣屬實雷鳴屬虛寒考之經論無一屬實其甚者為往來蛙聲是因中焦不運下焦不通其狀腹內閣閣盈盈如蛙鳴從呼吸上下時與呼氣偕迸出其聲濁惡而長謂之硬氣此因上焦不歸上焦不歸下焦不通固莫可治之理但其不至與呼氣偕迸泄食之不絶者或可挽回矣一男子熱稍解腹無宿結心下膨悶時為往來蛙聲飲食俱減小便不利其脈無力是欲為下利也與補中湯出濟世方加附子而愈一武辨甫下強仕以縱酒多欲陰素大虧適感溫疫十有餘日而及熱半解精神隨衰食亦日減小便稀通忽發噦不止以勢危篤請治於余視其脈弱而無神可維特辭以逆施不及固請與四逆湯加人參無效忽兼見往來蛙聲證以無他策增重劑而投之每日所與之附子凡二十有餘錢參姜稱此連日無寸效跗上見腫而斃聊記證治以具參酌云論食溫疫有首尾能食者有從初不食者以不食者較能食者其能食者不唯胃氣和而已津液潤澤熱自易化不食者津液日涸藏府熯燥難治之理也但如少陰證間有略能食一日不斷者特勿恃食忽本證焉腎氣不通則真氣先竭精神恍惚言語錯亂遂至不濟雖食無益也此篇須論除中證古云消中是也蛔蟲證不舉此二證吳氏之闕典也夫如蛔蟲證抵熱略解之際諸證亦減卻飲食稍進唯腹中微熱不減尚時發忽惡食不食或心煩乾嘔而不受強與之嘔而困悶一二旬不食終亡害值此等證不論熱之多寡宜安蛔湯加附子又如除中證只食而能飢飢而能食雖食而津液不回瘦弱不復復熱不除大便不利或利而不止日漸罷弊是由脾胃之衰憊值此等證不問熱之劇易宜理中輩傷寒論論之諦矣論飲即論渴也又可氏曰如不欲飲冷當易百滾湯與之乃至不思飲則知胃和矣凡渴欲飲者以邪熱之焄蒸津液為之涸腹裡如湯涫故渴而自救耳其好冷水固常事也今畏冷好熱飲恐以熱助熱不可以不辨夫傷寒溫疫之渴概屬於陽明少陰之二證其屬陽明者必好冷水冰雪白虎承氣證是也又心下有留飲津液為不化生藏府失液而渴其有熱者好冷水無熱者好暖水不特好冰水乃留飲即滯水也五苓證是也又經曰腎惡燥今邪熱歸於少陰則邪熱與陰化下利亡津液遂成虛寒故渴引熱飲而自救耳假令其不下利亦有渴者以腎氣不通津液不施也將附子回陽則腎氣得通而五液並溉熱渴自止故渴好熱湯者屬少陰也清熱又可氏曰時疫首尾一於為熱獨不言清熱者是知因邪而發熱但能治其邪不能治其熱而熱自已邪之與熱猶形影相依形亡而影未有獨存者又可氏此論實不易之確論孰敢間然焉但其所謂治邪言以汗吐下三法攻之也然間有可攻之證而熇熇大熱蒸蒸身熱或時有休作熱仍不解不可如之何也時師逢此證概投升陽散火茈白諸湯而不解更與黃連解毒白虎加黃連輩妄事清熱愈清愈熱荏苒移時日其際大便不祕即滑利或小便不稀即癃閉或內衄吐紅不食日重精神疲弊恍惚言語不與人主當是雖時師罪然無可攻之證則不由清熱將何處索道乎時師之務清熱未可言無謂也但診候不諦故無效而已苟診候診諦乎可無大過矣夫風寒與溫疫等是為熱邪有一所感其處必熱診熱之輕重以知邪之所在若風寒之邪始著太陽故頭背熱甚而胸腹熱微若溫疫之邪橫著膜原故兩脅熱甚而及胸腹午後勢漸張以與太陽不相涉頭背熱反輕是溫疫與風寒之別也不識此形勢而臨病家失之於初則病中生許多之禍也及邪之入里也診猶有若此者假令內蓄風毒外必不仁內結癰膿外必甲錯見於外者必根於內推而擴之診大表可知邪之所在古之法也知邪之所在考之脈證瞭然歷歷可視見而為製劑藥無虛發雖不中而不遠矣胸中有熱者虛里動而臂熱胃實者腹中熱心下硬滿而痛少陽有熱者右脅下熱其經拘急若連少腹膨然微滿者或下血胸腹及周身大熱若無大熱無甚發作煩渴好冷水舌上白胎其脈洪大若微洪大不論有汗無汗為熱在肌肉額骨熱如灼少腹熱不甚若微冷為下虛上盈四肢厥逆腹中反熱者為陽氣縮退是診熱之大略也所謂某處熱唯某處熱非言他處無熱較之他處特某處殊甚而已啻診候不切幾乎難得矣是余積年覃思私所得也向余療女孺甫五歲系溫疫六七日視之證屬陽明心下硬滿壯熱按之輒啼因知其痛與小承氣湯加甘草至夜再診大便未利然心下已軟熱大減微思食但少腹熱反甚是胃中之燥屎已降腸中也雖未得利知不俟朝必利其夜果得下二行不日而愈夫燥屎在胃則心下壯熱已降腸中則少腹熱甚蓋小兒皮肉薄弱邪之所在玲瓏可鑑至於大人肌肉敦厚雖不如此瑩徹而於理無二則能通其義或有得焉矣又按法治之熱仍不解反求之少陰得附子方解者間復有之詳見於少陰條應下諸證舌白胎疫邪在募原舌上白胎是其正候也傷寒邪傳少陽亦白胎胎無二等是熱病之所為何以別之少陽白胎其證往來寒熱疫邪白胎便渴而無惡寒是也又陰證之極有白胎滑如攤肪舌黑胎固屬胃實下後硬黑變軟黑是其常事若下後神不蘇善寐為餘邪入少陰又上盈下虛亦見黑胎與胃實無異舌黑無胎又可氏曰此經氣非下證也妊娠多見此陰證亦有此並非下證所謂經氣在經之邪熱不能透發於外卻內蒸於胸中也此證數欲漱而不欲飲治法宜茈胡劑妊娠多見此者內多蓄血液為外熱所蒸變見其色也猶地黃以酒蒸之其色便黑治法同經氣陰證見此者腎氣之困見其色也猶瘀熱在脾便發黃而有甚於此又見離離灰黑色乃腎氣之傾也並非附子劑不能挽回矣舌黑乾燥伏邪日久不離募原則邪熱熏胸中與心火相併郁為大熱津液涸竭則白胎老作焦黑色而乾燥恰與胃實之舌相似而無胎為異且以腹無胃實候應別之又有蛔動蟲氣熏膈見此候應就本條求之舌芒刺此候不繫於疫之輕重人之老少延捱引日津液素涸者舌上乾燥易生芒刺治法雖欲為主生津潤燥而為餘證所拘無暇專行滋陰也苟非慧悟於匕劑者多失乎機會悔而不及矣舌裂上盈下虛亦見此候舌短舌硬舌卷陰陽二證俱見此候多易取敗白沙胎下利傷津液亦見此候舌紅滑以大便下利不暇熱熏胸中故無胎以下利亡津液熱毫不除故紅滑乾燥宜急下之失下必死又伏邪陷於少陰所云舌黑乾燥隨消亦變作紅滑色宜加減真武湯舌兩道白胎邪尚在募原唇燥裂唇焦色唇口皮起並屬胃熱固當下又上盈下虛亦見此候唇口皮起陰證常多見此候口臭因胃熱湧宿飲宜下鼻孔如煙煤又可氏曰此疫毒在胃下下勿辭古人以為肺絶見此證必死仍應較餘證審諦發藥又有臥床日久燈煙煤黑者宜再審勿忽棄齒衄鼻衄胃實之溢於經也宜下之又上盈下虛亦見此證宜降火但鼻衄有連日不止至於二三升者勿怪裡熱從血解與汗解同理血已止專主養榮又力役行旅總勞身體者系疫或為鼻衄鼻衄者多死所以然者本因強力傷腎也口燥渴此證不獨陽證而已陰證亦每見此證經曰腎惡燥邪陷少陰五液不生故口燥渴自救時師不曉此義概投清熱藥徒延時日過事不鮮目赤咽乾氣噴如火上盈下虛亦見此證小便赤黑涓滴作痛小便極臭並熱迫下焦脈沈實而數為裡實並可下但無力者未可下揚手擲足即躁煩有虛實之分宜較餘證而定之概躁煩屬真氣幾微尚有可治者至身不寧危潮熱譫語二證並見屬胃實固可下又有神虛譫語詳見於本條善大息短氣屬胃實此證心下必滿並可下上盈下虛亦見此證心下滿心下高起如塊心下痛腹脹滿腹痛按之愈痛心下脹痛並胃實之正候固可下但脈無力數疾並不可下又陰證大便不通小便稀亦能脹痛不可下之二便利而脹痛自已又下後下證減而按之心下仍痛者有水結有積聚不可概為胃實腹皮貼背此以胃實失下纍日不食胃氣失養邪毒獨存脹滿頓除反作仰瓦狀形勢甚危似難施下務急下之或免鬼録但腹軟者屬虛頭脹痛頭熱耳鳴上盈下虛亦有此三證小便閉陰證每多此證詳於本條又有神怯恍惚小便閉者宜道赤散但遺失者不治大便閉陰證每多此證詳於本條又雖閉至一二旬而不下重無害於小便慎勿下之津液回而自通大腸膠閉協熱下利熱結傍流並詳於本條四逆脈厥體厥並失下者間至於此但煩躁無寧刻者不治又不下後有見此證者宜四逆輩不及者死詳見於本條發狂此證特見於白虎證其他概煩躁譫語之甚乃作狂狀也應補諸證又可氏曰虛證散在諸篇此不再贅余檢閲諸篇至說陰證乃僅僅匆匆而已此主張陽證務唱下劑至迄陰證故省略之求其意乃曰溫疫無陰證故不附載此以當年所行之疫與今時之疫其證有霄壤之違詳見於下項條今採摘類聚乎陰證上盈下虛證虛脫證以便參閲陰證善寐仲景云少陰為病但欲寒以此證所見平穩人皆以為熱消病減晏然不悚疑安知少陰之始證而陰險從此生又邪在少陽亦有眠者其他無有此證但病愈善寐者不繫焉唇口乾燥而無胎唇口皮起並津液不至咽舌紅滑邪熱入少陰上並手少陰則五液乾燥上焦仍熱故舌見紅滑又見於前應下證中舌黑沙胎發渴並虛火之妄動也詳於口燥渴條大熱而腹軟大熱舌無胎並診腹大熱如灼翣時按之手卻覺熱輕此係虛火妄動若手不覺熱輕仍宜以脈參較夜間大便滑泄此因內陽守乏夫至夜陽氣漸退陰氣隨長宜以下利之時刻度虛寒之微甚下利厥逆此證既具在傷寒論更不附懸噦逆腹中蛙聲並屬虛寒名見於本條小便稀小便閉小便遺大便閉此皆因陽氣不充於下焦也只將真武輩俟陽氣還回不勞而自利若強欲利用行氣利水藥不唯無益反招害脈沈數而弱浮數而弱重按如無見此脈者屬陰證況於微弱乎雖熱甚不可下脈數疾其狀如奔馬如急湍此衛氣失度也得此脈者雖諸陽證具非附子實下焦而不治詳見於本條上盈下虛證諸證附見於應下條中並本條其他三證具下頭哄熱下焦不治虛火奔騰之所致短氣息疏大吸氣不至腎周身大熱少腹熱輕或冷虛脫證如撮空理線微喘盼視髮根搔癢等五藏絶證人皆當所諳更不附載今舉所數經過證二三以具參考白㾦時師誤言白疹此證因衛氣衰而偶有治者但精神日虛憊不治診脈牽手縮去此證所見雖微而未見得生瘖不得言見此證必死詳見於本條屈膝仰臥此證系真氣虛微多不治猶魚之將死仰浮於水上下血如崩此證男子每十七八死婦人每十五六生此以女子陰有餘也躁煩無寧刻必死但四肢不厥者頭安於枕上者或可挽回又熱略解食稍進而煩躁不治者為邪乘心雖不至無寧刻而必死論陰證世間罕有天明壬寅年東西諸國溫疫大行其死亡者不可勝殫京師亦行其證概屬胃家實先之餘刻溫疫論從此法療多得全活然世鮮傳本雖有餘刻而輕視不敢讀人皆以傷寒法發汗為要汗出熱仍不解愈更增取汗是以津液先涸未至胃實煩躁至死亦不為不多是吳又可之所懼也無幾何東奧西肥之徒各馳書謝曰頃溫病大行依吳氏法治之其易如探囊中物皆先生之賜也余益信又可氏之有功於溫疫時師亦稍稍知取而讀之遂大布行久之或為余語曰一人系疫百療無效服附子理中湯得愈有諸初余冷笑不肯也適值腸澼病以苦寒攻之證候反劇更投桂枝人參湯脈腹俱和而愈夫腸澼亦病屬熱治尚如此特於溫疫未嘗無此理每值溫疫難瘥證診而不諦思而不得中心憒憒焉後讀嶺南衛生方於瘴瘧條私心略領之有感乎或語天明戊申春正月京師大火十萬之家頓為燒土人民落膽倣徨於道路無身可依或竄居於陋巷僻地或假寓於倉庫之存苟且圖生者十居其九誠可務恤也哉未幾何溫疫稍行至四五月盛行其證如胃家實而有所微見陰證仍用大黃死用附子則生與嶺外之瘴瘧趣相類示後年年所視之疫證治略相同但屬大黃證每十不過二三多用附子以免危與所謂胃實證霄壤懸隔初見伏邪證非敢有異今證之徑庭何其甚邪兒德輿曰蓋邪有剛柔也猶熱病有中風傷寒俱感於太陽隨其所傳百證變見疫邪亦有剛柔俱著於膜原隨其所傳百證變見但剛邪勢劇同氣相感傳於陽明柔邪勢緩不能傳胃同類相聚徑入於少陰下虛上盈猶傷寒有兩感證剛柔相半也吳氏言溫疫無陰證非吳氏之過顧其時柔邪尚不行吳氏未視疫有陰證也此說雖無據於古而於理未可擠根之又余嘗歷觀伏邪之傳胃每不多引日是邪離膜原之速而輕悍也其陷於少陰欲離膜原而不離稽滯多日方見陰證是邪重濁也指之言剛邪言柔邪似不可為河漢言據此求之治術亦有可為矣已寬政辛亥年從客臘溫疫稍行有陰證有陽證有上盈下虛證於一門內虛實並行以常慣陰證動易執迷致誤非能講究而瞭然乎胸坎安得緩急相應乎余一時療疫大小三次因歲氣有不同如今所記總系經驗苟有所違於法不死必危吉凶直見非如雜病之可左右也讀者其思之又可氏曰隨其證治之勿臆度其虛為陰證驟溫補可也至曰與房欲何與焉未可也經曰藏於精者春不病溫又玉版論要篇曰病溫虛甚死又可氏於四損證置之度外亦由精不足也余久歷視病形似不死而死多在多欲人少欲者雖失下羈遲尚有得生學者應留意焉謂與房欲不與揉曲過正也又可氏曰真陰者始則惡寒而不發熱四肢逆冷其脈沈細急投附子湯回陽王履所云直中傷寒是也余按此證是中寒之急證猶暑時之霍亂也吳王以此係傷寒溫疫似徑竇相失夫傷寒溫疫當漸攻傳裡而作陰證未聞有如此之陰證又可引捷要法曰陰陽二證以小便赤白為據萬不失一若夫如此於別陰陽乎何難之有以余所診視之雖陰證小便仍赤所以然者本因熱邪之所內陷與藏氣相搏蕩摩衝擊之際津液帶其氣而下故其色每赤但赤有濃淡已若上盈下虛其色尤甚於其際欲區別固為難若俟其清白方為陰證豈翅遲三十里而已乎舍病治弊一醫看此條縱飲冷水大熱頓解脫然而愈適值大渴證今恣飲水至二十餘盞而渴止則腹中暴脹發喘而死此輕視長沙與水禁之過也輕疫誤治條傷寒論平脈篇脈浮而大條云久久為痂癩太陽篇傷寒吐下後條云久而成痿陽明篇陽明病若中寒者條云欲作固瘕如此等證皆因誤治成痼疾又可氏於此篇發其餘緒示雖輕疫不可忽視余嘗視溫疫差後發狂者為虛勞者應查看下項主客交條肢體浮腫下後比熱稍解稍知食味有跗上微腫其人或微頭痛此陽明氣通非虛候也飲食調理不藥自愈服寒劑反熱氣為邪阻抑鬱為火火邪混同發作大熱此邪本也火末也邪退氣自通火消熱自清故邪不除無熱清之理但邪非汗下不除今無可汗可下之證無邪可逐之路不得已以苦寒清熱為務不唯熱不清反抑遏胃氣氣益不伸火更屈曲所以反熱也此又可氏之意善道清熱之無益而不置治方其意任下而取之若遇其無下證者將如之何也欲汗下以驅邪無可逐之證欲苦寒以清熱抑遏胃氣欲養榮以勝熱黏膈不受此余所疑而不決也療多人之間若值下焦一隅之有闕者輒本甘下火之語主用甘草附子降火和胃引火歸原大熱過半減卻神氣少蘇所餘小半之邪熱此自易化談笑可治耳知一論感疫而熱與飲酒而醉其趣即一宛然好比喻語曰能近取譬是之謂也四損吳氏曰四損言正氣真血真陰真陽之毀損當此之際忽又加疫邪氣雖輕併為難治以正氣先虧邪氣自陷故諺有云傷寒死下虛人所云真陽虧損邪氣陷死下虛並言邪氣陷少陰也又云氣不足以息言不足以聽即汲汲少氣也欲言而不能即瘖而無聲也並屬下虛證所云四肢厥逆下利清穀肌體惡寒恆多泄瀉至夜益甚口鼻冷氣即是少陰證感邪雖重反無發熱燥渴胎刺等證今視少陰證多兼此等證但舍此等證恃通腎氣為佳又云陰凝不化即腎氣不通也邪留而不行即不傳於他也余按於四損中除亡血家之外總是少陰證也自指陰證不言陰證而謂溫疫無陰證又云陰證散見諸篇其言不一定竊以似吳氏於己心有所不安以不置治方是以世讀溫疫論者不知瘟疫有陰證而過人最多是所以余鄭重論辨也吳氏曰真血不足者即亡血虛家也真陰不足者即津液乾涸也津液屬腎血屬心雖所治異位至於榮養四肢百骸乃血液無二今血液乾涸熱邪乘之藏府經絡一時乾焦滋陰養榮無暇施及神氣飄蕩而死但有真陽一點之資者或回生於萬一勞復食復一少婦罹疫以壻家少看護移病於外家而請治余診證屬失下越三十日邪熱已解肪證俱平唯血氣未復余囑父母曰古語云病如少愈看護勿懈頃之少婦坐不堪曠閒請行藥拜舅姑遂去宿壻家翌晡發大熱煩渴口舌乾燥不食病勢日加重藥無寸效六七日而逝又一男子病腳氣新瘥但脈數未平傍人曰彼宿有合巹約定壻在近而難愆期奈之何余曰外臺云腳氣因腎虛今娶必死耳不聽遂娶其夜衝心而死女勞之復如此其急豈可不慎乎一婦人甫草有五病疫為下虛上實證四十餘日而邪熱已解飲食漸進時至過飽制之不肯一日大吃食肉卒發大腹痛四肢厥逆頭汗淋漓六脈虛微急與四逆加人參湯數貼方回陽續大熱復發飲食大減諸如前日證更與茈胡清燥湯十有五日才復舊觀食後證有如此甚者溫瘧前條二則一論瘧疾數日而見疫證一證疫熱已解而見瘧狀此條所論乃瘧而見下證即瘧疫兼證耳不可別建溫瘧之目一婦歲四十餘病瘧七八發用劫法截之六七日後復更發熱勢甚於前日連發數日發無定期或一日再發及其發也兩腳指頭焮痛號呼動傍人不可觸近已及其醒痛亦隨減診之舌上黑胎大便難不食脈微欲絶或沈伏不應此瘧兼微疫失下之所致殆為脈厥與知母湯見願體廣類集加鱉甲大黃取下日二三行至六七行瘧勢隨減痛亦隨已旬有餘日而愈瘟疫腳氣兼證瘟疫十餘日一夜心下大痛下利三四行嗣後痛減而下利不止小便日減腳漸痹痛經數日復熱加重唇舌乾燥胸腹大滿兩腳不舉神氣惛蒙二便遺失脈沈數而弱趺陽少陰伏而不應時師與桂附劑數日無效請余診之曰此證因下利下焦衰弱腳氣乘其虛也是為溫疫腳氣兼證今雖表無大熱毒引毒已薄心危在旦夕若不忍坐視莫如用紫雪幸有利熱毒並解為一舉兩得矣病家怖而不服不日而逝又向視梅毒腳氣兼證衝心氣急旦不待夕余將紫雪救燒發之急不得全效然延命數日若及未瀕死或得回天之功爾以其則不遠附言於此斑黃併發松峰疫說舉斑黃併發證治其證先發黃旋即發斑以其人素弱用托裡舉斑湯茵陳五苓散於二方中採擇與之已服一劑次早發戰汗而後斑黃並退豁然而愈隨名其方曰斑黃雙解散茵陳豬苓茯苓澤瀉梔子生地黃甘草芍藥當歸以上九味余未視此證或可有之證故採録以備參酌若此證有於實家以茵陳蒿湯取一下瘀熱以行斑毒自透徹如所云搏足鳥之論婦人時疫吳氏曰婦人時疫與男子無二但其所異者獨為熱入血室故全篇就傷寒熱入血室三條演其義而已妊娠時疫經六元正紀論曰婦人重身毒之有故無殞亦無殞通篇依此義立論吳氏云用當其證見大黃為安胎之聖藥孫真人以大黃置補藥之第一千金翼又可氏之言有所祖小兒時疫通篇善曲盡時情飛霞幼幼集成論搐全依此篇以擴充義理頗有可觀者主客交三甲散從大黃䗪蟲丸拈出但䗪蟲丸逐瘀為主破結滋陰為次三甲散破結滋陰為主逐瘀為次蓋又可氏煆煉之方可與䗪蟲丸並駕也又可氏云男女因他病肌肉消爍邪火獨存此際感疫醫家易誤診失治逡巡曠日則客邪雖輕尚膠固於血脈主客交渾遂作痼疾乃謂成虛勞病也余每值此證度輕重深淺隨證撰用此二方其未至勞極間奏殊效正名仲景祖述熱論而作傷寒論業已曰熱曰寒至發熱而渴不惡寒證表裡證該見無更可目焉夫寒熱陰陽之偏氣陰帶陽曰冷陽帶陰曰溫即有表裡相兼之義取以命之曰溫病蓋非有他義矣九傳又可氏於此條詳論伏邪有九傳其要不過外傳於三陽內傳於胃之二途以歷年余所診考之於二途外又有二途有伏邪徑傳於腎有半傳於胃半傳於腎名曰下虛上盈其傳胃者大黃可下而取傳腎者附於可通而回至下虛上實乃用大黃則胃熱可瀉而滋損腎氣復用附子則腎氣可通而增助胃熱然則附子大黃並用乎外臺云神丹甘遂合與之類也故於此二途下虛上盈尤為難治經評熱病論曰陰陽交者死此證亦可謂也證治詳見於本條正誤傷寒例以下諸子不認溫疫之真冥搜摸索為空誤妄說恐詿誤來學喻嘉言擒而硬笞諸前吳又可從而刑諸後以二公之明千載之滯義一時如洗冤仲景再出必以龍圖見矣
